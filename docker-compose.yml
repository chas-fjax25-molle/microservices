services:
  service-registry:
    build:
      context: .
      dockerfile: service-registry/Dockerfile
    environment:
      SERVER_PORT: 8761
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      retries: 5
      start_period: 30s

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
