spring:
    application:
        name: booking-service
    datasource:
        url: jdbc:h2:mem:testdb
        driver-class-name: org.h2.Driver
        username: sa
        password:
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
            ddl-auto: create-drop
    h2:
        console:
            enabled: false

# Disable Vault for tests
vault:
    addr:
    token:

logging:
    level:
        root: INFO
        com.example: DEBUG
