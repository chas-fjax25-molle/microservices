spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            discovery:
                locator:
                    enabled: true
                    lower-case-service-id: true
            routes:
                - id: user-service
                  uri: lb://user-service
                  predicates:
                    - Path=/api/user-service/**
                  filters:
                    - StripPrefix=2
                    - AddRequestHeader=X-Service-Name,user-service

eureka:
    client:
        serviceUrl:
            defaultZone: http://service-registry:8761/eureka/

springdoc:
    api-docs:
        enabled: true
    swagger-ui:
        enabled: true
        path: /swagger-ui.html
        config-url: /v3/api-docs/swagger-config
        urls:
            - name: User Service
              url: /api/user-service/v3/api-docs