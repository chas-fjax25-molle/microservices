spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            discovery:
                locator:
                    enabled: true
                    lower-case-service-id: true

        routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                  - Path=/api/user-service/**

eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/

